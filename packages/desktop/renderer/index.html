<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self';" />
  <title>Neogebra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root { color-scheme: light; }
    html, body, #root { height: 100%; margin: 0; }
    body {
      font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', sans-serif;
      background: #f6f7fb;
      color: #27282b;
      -webkit-font-smoothing: antialiased;
    }
    /* interactive primitives — hover/active/focus animations */
    .nx-btn { transition: background .16s ease, box-shadow .16s ease, transform .08s ease, border-color .16s ease, filter .16s ease; }
    .nx-btn:hover:not(:disabled) { filter: brightness(0.985); }
    .nx-btn:active:not(:disabled) { transform: translateY(1px) scale(0.99); }
    .nx-btn:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(101,87,211,.35) !important; }
    .nx-btn-primary:hover:not(:disabled) { box-shadow: 0 3px 12px rgba(101,87,211,.42) !important; transform: translateY(-1px); }
    .nx-btn-ghost:hover:not(:disabled) { background: #f0f2f8 !important; border-color: #c7ccdb !important; }
    .nx-btn-danger:hover:not(:disabled) { background: #fdeceb !important; border-color: #f3c9c7 !important; }
    .nx-card { transition: box-shadow .18s ease, transform .12s ease, border-color .16s ease; }
    .nx-row { transition: background .15s ease, border-color .15s ease, transform .1s ease; }
    .nx-row:hover { background: #f0f2f8 !important; }
    .nx-switcher:hover { border-color: #c7ccdb !important; box-shadow: 0 2px 10px rgba(28,30,46,.1) !important; }
    .nx-opt { transition: background .12s ease; }
    .nx-opt:hover { background: #f0f2f8 !important; }
    .nx-fade-in { animation: nxFade .22s ease both; }
    @keyframes nxFade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .nx-pop { animation: nxPop .16s cubic-bezier(.2,.9,.3,1) both; transform-origin: top center; }
    @keyframes nxPop { from { opacity: 0; transform: scale(.97) translateY(-4px); } to { opacity: 1; transform: none; } }
    .nx-toast { animation: nxToast .25s cubic-bezier(.2,.9,.3,1) both; }
    @keyframes nxToast { from { opacity: 0; transform: translate(-50%, 12px); } to { opacity: 1; transform: translate(-50%, 0); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="./app.bundle.js"></script>
</body>
</html>
